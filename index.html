<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#3366ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="工作日历">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/style.css">
  <title>工作日历</title>
</head>
<body>
  <div id="app">
    <!-- 版本更新横幅（有新版本时由 app.js 显示） -->
    <div id="update-banner" class="hidden">
      🔄 发现新版本，点击此处更新
    </div>
    <div id="nav-bar"><!-- 年月导航按钮由 app.js 填充 --></div>
    <div id="month-label"></div>
    <div id="calendar-grid"><!-- 7列日历由 app.js 填充 --></div>

    <!-- 日志编辑面板（底部滑出） -->
    <div id="log-panel" class="hidden">
      <div id="log-title"></div>
      <textarea id="log-textarea" placeholder="记录今天的工作内容…"></textarea>
      <div id="log-actions">
        <button id="log-save">保存</button>
        <button id="log-close">关闭</button>
      </div>
    </div>

    <!-- 颜色图例 -->
    <div id="legend"><!-- 由 app.js 填充 --></div>

    <!-- 状态栏 -->
    <div id="status-bar"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
